<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성과상여금 등급 확인</title>
    <!-- 외부 스타일 시트 연결 -->
    <link rel="stylesheet" href="style.css">
    <!-- Excel 처리를 위한 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            min-height: 24px;
            white-space: pre-line;
            line-height: 1.6;
        }
        .status-msg {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        .error-box {
            color: #d9534f;
            background: #fdf7f7;
            border: 1px solid #d9534f;
            padding: 10px;
            font-size: 0.8em;
            margin-bottom: 15px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>성과상여금 등급 확인</h1>
        <p>본인의 성명과 주민등록번호를 입력하세요.</p>
        
        <!-- 데이터 로딩 상태 표시 -->
        <div id="fileStatus" class="status-msg">시스템 초기화 중...</div>
        <div id="errorDisplay" class="error-box"></div>

        <input type="text" id="teacherName" placeholder="예: 홍길동">
        <input type="text" id="idNumber" placeholder="예: 주민번호(- 생략)">
        
        <button id="checkBtn" onclick="checkGrade()" disabled>등급 확인하기</button>

        <div id="result"></div>
    </div>

    <script>
        let cachedData = null;
        // 깃허브 레포지토리에 업로드된 파일명 (동일 경로에 있어야 함)
        const EXCEL_FILE_NAME = 'teachergr.xlsx';

        // 페이지 로드 시 엑셀 파일 자동 로드
        async function initSystem() {
            const statusDiv = document.getElementById('fileStatus');
            const errorDisplay = document.getElementById('errorDisplay');
            const checkBtn = document.getElementById('checkBtn');

            try {
                // 깃허브 서버에서 파일을 가져옴
                const response = await fetch(EXCEL_FILE_NAME, { cache: "no-cache" });
                
                if (!response.ok) {
                    throw new Error(`파일을 찾을 수 없습니다 (HTTP ${response.status}).`);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                
                // 첫 번째 시트 데이터 추출
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                cachedData = XLSX.utils.sheet_to_json(worksheet);
                
                if (!cachedData || cachedData.length === 0) {
                    throw new Error("파일에 유효한 데이터가 없습니다.");
                }

                statusDiv.textContent = "조회 준비 완료";
                statusDiv.style.color = "#28a745";
                checkBtn.disabled = false;
                errorDisplay.style.display = "none";

            } catch (err) {
                statusDiv.textContent = "시스템 오류";
                statusDiv.style.color = "#d9534f";
                errorDisplay.style.display = "block";
                errorDisplay.innerHTML = `
                    <strong>데이터 로드 실패:</strong> ${err.message}<br>
                    관리자에게 문의하시거나 파일 업로드 상태를 확인하세요.
                `;
                console.error("Initialization Error:", err);
            }
        }

        function checkGrade() {
            const teacherNameInput = document.getElementById('teacherName').value.trim();
            const idNumberInput = document.getElementById('idNumber').value.trim();
            const resultDiv = document.getElementById('result');

            if (!cachedData) {
                resultDiv.textContent = "데이터가 로드되지 않았습니다.";
                resultDiv.style.color = "red";
                return;
            }

            if (!teacherNameInput || !idNumberInput) {
                resultDiv.textContent = "성명과 주민등록번호를 모두 입력하세요.";
                resultDiv.style.color = "red";
                return;
            }

            // 주민번호에서 숫자만 추출하여 비교
            const searchId = idNumberInput.replace(/[^0-9]/g, "");

            // 데이터 검색
            const foundUser = cachedData.find(row => {
                const rowId = String(row['주민등록번호'] || row['주민번호'] || "").replace(/[^0-9]/g, "").trim();
                const rowName = String(row['이름'] || row['성명'] || "").trim();
                return rowId === searchId && rowName === teacherNameInput;
            });

            if (foundUser) {
                const grade = foundUser['등급'] || '정보 없음';
                resultDiv.innerHTML = `
                    <span style="color:#555">${foundUser['이름']} 선생님의 확인 결과</span><br>
                    성과 등급: <span style="font-size:1.5em; color:#007bff;">[${grade}]</span>
                `;
                resultDiv.style.color = "black";
            } else {
                resultDiv.textContent = "일치하는 정보가 없습니다.\n성명과 번호를 다시 확인해 주세요.";
                resultDiv.style.color = "red";
            }
        }

        // 초기화 실행
        window.addEventListener('load', initSystem);

        // 엔터키 지원
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !document.getElementById('checkBtn').disabled) {
                    checkGrade();
                }
            });
        });
    </script>
</body>
</html>
